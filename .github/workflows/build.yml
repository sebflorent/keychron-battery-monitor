name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -c release

      - name: Verify binary
        run: |
          BINARY=.build/release/KeychronBatteryMonitor
          test -f "$BINARY" && echo "Binary exists: $BINARY"
          file "$BINARY"

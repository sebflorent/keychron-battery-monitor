name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build release binary
        run: swift build -c release

      - name: Create .app bundle
        run: make app VERSION=${{ steps.version.outputs.VERSION }}

      - name: Create .dmg
        run: make dmg VERSION=${{ steps.version.outputs.VERSION }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Keychron Battery Monitor ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            .build/KeychronBatteryMonitor-${{ steps.version.outputs.VERSION }}.dmg
          body: |
            ## Keychron Battery Monitor ${{ github.ref_name }}

            ### Install
            1. Download `KeychronBatteryMonitor-${{ steps.version.outputs.VERSION }}.dmg`
            2. Open the DMG and drag the app to your Applications folder
            3. Right-click → Open on first launch (Gatekeeper will prompt)

            ### What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
